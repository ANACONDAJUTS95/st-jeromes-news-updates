name: Sync Facebook News

on:
  schedule:
    - cron: '0 0 */3 * *' # Every 3 days at midnight
  workflow_dispatch: # Allow manual trigger from GitHub UI
    inputs:
      limit:
        description: "Number of posts to scrape/process (e.g. 15 for a one-time backfill)"
        required: false
        default: "3"
  repository_dispatch:
    types: [sync-news] # Allow API trigger from Next.js

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run news sync
        env:
          SYNC_LIMIT: ${{ github.event.client_payload.limit || github.event.inputs.limit || 3 }}
          FB_URL: ${{ secrets.FB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_API_KEY: ${{ secrets.WEBHOOK_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: node scripts/sync-news.js

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-debug-screenshots
          path: |
            data/debug.png
            data/error.png
          if-no-files-found: ignore
          retention-days: 7
